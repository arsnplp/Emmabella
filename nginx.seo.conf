# nginx.seo.conf — à intégrer manuellement à la configuration nginx de production
#
# Ce fichier n'est PAS déployé automatiquement (pas d'accès SSH prod dans cette
# tâche). Il liste les blocs à fusionner dans la config nginx existante du site
# (probablement /etc/nginx/sites-available/emmabella.fr ou équivalent).
#
# Contexte : le site répond actuellement en HTTP 200 identique sur
# https://emmabella.fr/ ET https://www.emmabella.fr/ (pas de redirection),
# et n'envoie AUCUN header Cache-Control (vérifié via `curl -sI`) — chaque
# visite retélécharge tout le HTML et toutes les images. Ce fichier corrige
# les deux points, et active la compression.
#
# Après déploiement, vérifier avec :
#   curl -sIL http://www.emmabella.fr/        # doit faire 301 -> https://emmabella.fr/
#   curl -sIL https://www.emmabella.fr/       # doit faire 301 -> https://emmabella.fr/
#   curl -sI https://emmabella.fr/assets/site.css   # doit avoir Cache-Control: ...immutable
#   curl -sI https://emmabella.fr/index.html        # doit avoir Cache-Control: max-age=3600
#   curl -sI -H "Accept-Encoding: br" https://emmabella.fr/    # doit avoir Content-Encoding: br


# ─────────────────────────────────────────────────────────────────────────
# 1. Redirection 301 www -> non-www (à placer dans un server{} dédié)
#
# emmabella.fr est choisi comme domaine canonique (cohérent avec les balises
# <link rel="canonical"> et le sitemap.xml, déjà mis à jour en ce sens).
# Sans cette redirection serveur, Google peut crawler/indexer les deux hôtes
# séparément et diluer l'autorité du site entre les deux versions.
# ─────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.emmabella.fr;

    # Réutiliser le certificat SSL déjà émis pour le domaine (couvre
    # généralement les deux hôtes si obtenu via Let's Encrypt/certbot avec
    # -d emmabella.fr -d www.emmabella.fr). Adapter les chemins si différents.
    ssl_certificate     /etc/letsencrypt/live/emmabella.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emmabella.fr/privkey.pem;

    return 301 https://emmabella.fr$request_uri;
}


# ─────────────────────────────────────────────────────────────────────────
# 2. Cache-Control — à ajouter DANS le server{} existant de emmabella.fr,
#    à l'intérieur (ou juste après) le bloc `root /chemin/vers/SiteRDV1;`
# ─────────────────────────────────────────────────────────────────────────

# Assets versionnés/statiques : logo, CSS, JS, images optimisées (avif/webp/
# jpg/png). Ces fichiers ne changent jamais sans changer de nom -> cache long
# + immutable pour éviter toute revalidation inutile sur chaque visite.
location ~* ^/(assets|images)/.*\.(css|js|avif|webp|jpg|jpeg|png|svg|ico|woff2?)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    access_log off;
}

# Pages HTML : cache court, le temps d'absorber le trafic répété sans
# retélécharger à chaque clic, mais assez court pour que les mises à jour de
# contenu (nouvel article de blog, etc.) remontent vite.
location ~* \.html$ {
    add_header Cache-Control "public, max-age=3600" always;
}

# sitemap.xml / robots.txt : cache très court, doivent rester à jour pour les
# robots d'indexation.
location ~* ^/(sitemap\.xml|robots\.txt)$ {
    add_header Cache-Control "public, max-age=300" always;
}


# ─────────────────────────────────────────────────────────────────────────
# 3. Compression — à ajouter au niveau http{} ou server{}
# ─────────────────────────────────────────────────────────────────────────

# Gzip (support universel, fallback si Brotli indisponible côté client/module)
gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 512;
gzip_types
    text/plain
    text/css
    text/xml
    application/xml
    application/json
    application/javascript
    application/ld+json
    image/svg+xml;

# Brotli (meilleur taux de compression que gzip à qualité égale) — nécessite
# le module ngx_brotli (souvent absent par défaut, à installer :
# `apt install nginx-module-brotli` sur Ubuntu, ou compiler nginx avec le
# module). Si le module n'est pas disponible, gzip seul reste actif et le
# site fonctionne normalement — Brotli est une amélioration, pas un prérequis.
# load_module modules/ngx_http_brotli_filter_module.so;   # à ajouter en tête de nginx.conf si besoin
# load_module modules/ngx_http_brotli_static_module.so;
brotli on;
brotli_comp_level 5;
brotli_types
    text/plain
    text/css
    text/xml
    application/xml
    application/json
    application/javascript
    application/ld+json
    image/svg+xml;


# ─────────────────────────────────────────────────────────────────────────
# 4. Sécurité complémentaire (bonus, hors périmètre strict mais recommandé
#    vu que emmabella-update.tar.gz et un PDF contenant des données
#    personnelles étaient servis publiquement avant cette refonte)
# ─────────────────────────────────────────────────────────────────────────

location ~* \.(tar\.gz|zip|sql|bak)$ {
    deny all;
}

location = /scripts/ {
    deny all;
}
